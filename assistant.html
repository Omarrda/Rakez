<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="assistant.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="assistant-container">
        <h3>Active Assistant</h3>
        <button id="summarize-btn" class="assistant-btn">
            <i class="fa-solid fa-file-lines"></i> Summarize
        </button>
        <button id="define-btn" class="assistant-btn">
            <i class="fa-solid fa-book"></i> Define Terms
        </button>
        <button id="quiz-btn" class="assistant-btn">
            <i class="fa-solid fa-question-circle"></i> Quiz Me
        </button>

        <div id="ai-results-container" class="results-container">
            <!-- AI results will be injected here -->
        </div>
    </div>
    <script src="assistant.js"></script>
</body>
</html>
