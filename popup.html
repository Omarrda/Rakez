<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> 
        body { width: 320px; padding: 15px; background: #F4F6F8; } 
        .popup-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .popup-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 10px; border: 1px solid #E2E8F0; }
        h3 { font-size: 1rem; color: #1D3557; margin: 0; }
        .goal-text { font-size: 1.1rem; font-weight: bold; color: #2A9D8F; margin-top: 5px; }
        .stat-row { display: flex; justify-content: space-between; font-size: 0.9rem; color: #64748B; margin-top: 5px; }
        .stat-val { font-weight: bold; color: #1A222E; }
    </style>
</head>
<body>
    <div class="popup-header">
        <img src="rakezgreytransparentcropped.png" style="height: 25px;">
        <span class="tag-pill" style="background:#2A9D8F; color:white;">Active</span>
    </div>

    <div class="popup-card">
        <p style="font-size: 0.8rem; color: #64748B; text-transform: uppercase; font-weight: bold;">Current Goal</p>
        <div id="goal-display" class="goal-text">Loading...</div>
    </div>

    <div class="popup-card">
        <div class="stat-row">
            <span>Focus Score</span>
            <span class="stat-val" id="score-display">--</span>
        </div>
        <div class="stat-row">
            <span>Notes Taken</span>
            <span class="stat-val" id="notes-display">--</span>
        </div>
    </div>

    <button id="open-dash" class="btn-primary" style="width: 100%; text-align: center;">
        <i class="fa-solid fa-gauge-high"></i> Open Dashboard
    </button>

    <script>
        document.getElementById('open-dash').addEventListener('click', () => {
            chrome.runtime.openOptionsPage();
        });

        document.addEventListener('DOMContentLoaded', () => {
            chrome.storage.local.get(['goal', 'focusScore', 'notes'], (data) => {
                document.getElementById('goal-display').textContent = data.goal || 'No goal set.';
                document.getElementById('score-display').textContent = data.focusScore || 100;
                document.getElementById('notes-display').textContent = (data.notes || []).length;
            });
        });
    </script>
</body>
</html>
